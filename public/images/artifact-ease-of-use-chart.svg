<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 488 220" fill="none" font-family="Inter, system-ui, sans-serif">

  <!-- Background -->
  <rect width="488" height="220" fill="white" rx="8"/>

  <!-- Title -->
  <text x="24" y="28" font-size="13" font-weight="700" fill="#111827">Ease-of-use rating</text>

  <!-- Gridlines (behind bars) -->
  <line x1="162" y1="36" x2="162" y2="130" stroke="#f3f4f6" stroke-width="1"/>
  <line x1="222" y1="36" x2="222" y2="130" stroke="#f3f4f6" stroke-width="1"/>
  <line x1="282" y1="36" x2="282" y2="130" stroke="#f3f4f6" stroke-width="1"/>
  <line x1="343" y1="36" x2="343" y2="130" stroke="#f3f4f6" stroke-width="1"/>
  <line x1="403" y1="36" x2="403" y2="130" stroke="#f3f4f6" stroke-width="1"/>
  <line x1="464" y1="36" x2="464" y2="130" stroke="#f3f4f6" stroke-width="1"/>

  <!-- Row labels -->
  <text x="24" y="65" font-size="12" fill="#374151">Function-based</text>
  <text x="24" y="105" font-size="12" fill="#374151">Class-based</text>

  <!-- Bar 1 — Function-based (3.27/5 × 302px = 198px) -->
  <rect x="162" y="46" width="198" height="28" rx="4" fill="#1D4ED8"/>

  <!-- Bar 2 — Class-based (2.55/5 × 302px = 154px) -->
  <rect x="162" y="86" width="154" height="28" rx="4" fill="#9ca3af"/>

  <!-- Value labels -->
  <text x="368" y="65" font-size="13" font-weight="700" fill="#1D4ED8">3.27</text>
  <text x="324" y="105" font-size="13" font-weight="700" fill="#6b7280">2.55</text>

  <!-- Axis line -->
  <line x1="162" y1="130" x2="464" y2="130" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Axis tick labels -->
  <text x="162" y="149" text-anchor="middle" font-size="11" fill="#9ca3af">0</text>
  <text x="222" y="149" text-anchor="middle" font-size="11" fill="#9ca3af">1</text>
  <text x="282" y="149" text-anchor="middle" font-size="11" fill="#9ca3af">2</text>
  <text x="343" y="149" text-anchor="middle" font-size="11" fill="#9ca3af">3</text>
  <text x="403" y="149" text-anchor="middle" font-size="11" fill="#9ca3af">4</text>
  <text x="464" y="149" text-anchor="middle" font-size="11" fill="#9ca3af">5</text>

  <!-- Caption -->
  <text x="24" y="171" font-size="12" fill="#6b7280">Ease-of-use rating, 5-point Likert. n=11 across 5 industries.</text>
  <text x="24" y="187" font-size="12" fill="#6b7280">Function-based (3.27) vs. class-based (2.55), a 0.72-point margin.</text>

</svg>
