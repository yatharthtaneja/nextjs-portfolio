<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 488 220" fill="none" font-family="Inter, system-ui, sans-serif">

  <!-- Background -->
  <rect width="488" height="220" fill="white" rx="8"/>

  <!-- Title -->
  <text x="24" y="28" font-size="13" font-weight="700" fill="#111827">Distinct pain points coded</text>

  <!-- Gridlines (behind bars) -->
  <line x1="162" y1="36" x2="162" y2="130" stroke="#f3f4f6" stroke-width="1"/>
  <line x1="238" y1="36" x2="238" y2="130" stroke="#f3f4f6" stroke-width="1"/>
  <line x1="313" y1="36" x2="313" y2="130" stroke="#f3f4f6" stroke-width="1"/>
  <line x1="389" y1="36" x2="389" y2="130" stroke="#f3f4f6" stroke-width="1"/>
  <line x1="464" y1="36" x2="464" y2="130" stroke="#f3f4f6" stroke-width="1"/>

  <!-- Row labels -->
  <text x="24" y="65" font-size="12" fill="#374151">Function-based</text>
  <text x="24" y="105" font-size="12" fill="#374151">Class-based</text>

  <!-- Bar 1 — Function-based (9/20 × 302px = 136px, winner = blue) -->
  <rect x="162" y="46" width="136" height="28" rx="4" fill="#1D4ED8"/>

  <!-- Bar 2 — Class-based (15/20 × 302px = 227px) -->
  <rect x="162" y="86" width="227" height="28" rx="4" fill="#9ca3af"/>

  <!-- Value labels -->
  <text x="306" y="65" font-size="13" font-weight="700" fill="#1D4ED8">9</text>
  <text x="397" y="105" font-size="13" font-weight="700" fill="#6b7280">15</text>

  <!-- Axis line -->
  <line x1="162" y1="130" x2="464" y2="130" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Axis tick labels -->
  <text x="162" y="149" text-anchor="middle" font-size="11" fill="#9ca3af">0</text>
  <text x="238" y="149" text-anchor="middle" font-size="11" fill="#9ca3af">5</text>
  <text x="313" y="149" text-anchor="middle" font-size="11" fill="#9ca3af">10</text>
  <text x="389" y="149" text-anchor="middle" font-size="11" fill="#9ca3af">15</text>
  <text x="464" y="149" text-anchor="middle" font-size="11" fill="#9ca3af">20</text>

  <!-- Caption -->
  <text x="24" y="171" font-size="12" fill="#6b7280">Distinct pain points coded by API style.</text>
  <text x="24" y="187" font-size="12" fill="#6b7280">Lower is better — fewer ergonomic frictions.</text>

</svg>
