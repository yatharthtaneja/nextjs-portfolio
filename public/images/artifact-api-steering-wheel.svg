<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" fill="none" font-family="Inter, system-ui, sans-serif">

  <!-- Background -->
  <rect width="1200" height="540" fill="#EFF6FF" rx="16"/>

  <!-- ══════════════════════════════════════════════════
       CARD 1 — NI-DAQmx C Library (the engine)
       x=50, y=145, w=210, h=230
  ══════════════════════════════════════════════════ -->
  <g transform="translate(50,145)">
    <rect width="210" height="230" rx="14" fill="white" stroke="#C4D9F7" stroke-width="1.5"/>
    <!-- icon bg -->
    <rect width="210" height="118" rx="14" fill="#DBEAFE"/>
    <rect y="106" width="210" height="12" fill="#DBEAFE"/>
    <!-- chip body -->
    <rect x="34" y="13" width="142" height="90" rx="8" fill="white" stroke="#1D4ED8" stroke-width="2"/>
    <!-- subtle grid lines inside chip -->
    <line x1="76" y1="13" x2="76" y2="103" stroke="#DBEAFE" stroke-width="1"/>
    <line x1="105" y1="13" x2="105" y2="103" stroke="#DBEAFE" stroke-width="1"/>
    <line x1="134" y1="13" x2="134" y2="103" stroke="#DBEAFE" stroke-width="1"/>
    <!-- left pins (5) -->
    <rect x="12" y="26" width="22" height="8" rx="3" fill="#1D4ED8"/>
    <rect x="12" y="40" width="22" height="8" rx="3" fill="#1D4ED8"/>
    <rect x="12" y="54" width="22" height="8" rx="3" fill="#1D4ED8"/>
    <rect x="12" y="68" width="22" height="8" rx="3" fill="#1D4ED8"/>
    <rect x="12" y="82" width="22" height="8" rx="3" fill="#1D4ED8"/>
    <!-- right pins (5) -->
    <rect x="176" y="26" width="22" height="8" rx="3" fill="#1D4ED8"/>
    <rect x="176" y="40" width="22" height="8" rx="3" fill="#1D4ED8"/>
    <rect x="176" y="54" width="22" height="8" rx="3" fill="#1D4ED8"/>
    <rect x="176" y="68" width="22" height="8" rx="3" fill="#1D4ED8"/>
    <rect x="176" y="82" width="22" height="8" rx="3" fill="#1D4ED8"/>
    <!-- C label in chip -->
    <text x="105" y="68" text-anchor="middle" font-size="30" font-weight="700" fill="#1D4ED8">C</text>
    <!-- card labels -->
    <text x="105" y="140" text-anchor="middle" font-size="14" font-weight="700" fill="#1D4ED8">NI-DAQmx</text>
    <text x="105" y="160" text-anchor="middle" font-size="14" font-weight="700" fill="#1D4ED8">C Library</text>
    <text x="105" y="182" text-anchor="middle" font-size="12" fill="#6b7280">The shared engine</text>
    <text x="105" y="200" text-anchor="middle" font-size="12" fill="#6b7280">underneath both</text>
    <text x="105" y="218" text-anchor="middle" font-size="12" fill="#6b7280">MATLAB wrappers</text>
  </g>

  <!-- ══════════════════════════════════════════════════
       CARD 2a — Function-based / daqeval (round wheel)
       x=465, y=58, w=240, h=184
  ══════════════════════════════════════════════════ -->
  <g transform="translate(465,58)">
    <rect width="240" height="184" rx="14" fill="white" stroke="#C4D9F7" stroke-width="1.5"/>
    <!-- icon bg -->
    <rect width="240" height="98" rx="14" fill="#DBEAFE"/>
    <rect y="86" width="240" height="12" fill="#DBEAFE"/>
    <!-- round steering wheel, center (120, 48) r=36 -->
    <circle cx="120" cy="48" r="36" stroke="#1D4ED8" stroke-width="4" fill="none"/>
    <!-- 3 spokes at 270°, 30°, 150° (up, lower-right, lower-left) -->
    <line x1="120" y1="48" x2="120" y2="12" stroke="#1D4ED8" stroke-width="4" stroke-linecap="round"/>
    <line x1="120" y1="48" x2="151" y2="66" stroke="#1D4ED8" stroke-width="4" stroke-linecap="round"/>
    <line x1="120" y1="48" x2="89"  y2="66" stroke="#1D4ED8" stroke-width="4" stroke-linecap="round"/>
    <!-- hub -->
    <circle cx="120" cy="48" r="10" fill="#1D4ED8"/>
    <circle cx="120" cy="48" r="4"  fill="white"/>
    <!-- card labels -->
    <text x="120" y="116" text-anchor="middle" font-size="13" font-weight="700" fill="#1D4ED8">Function-based</text>
    <text x="120" y="134" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="600" fill="#1D4ED8">daqeval</text>
    <text x="120" y="155" text-anchor="middle" font-size="11" fill="#6b7280">1 call per C function</text>
    <text x="120" y="171" text-anchor="middle" font-size="11" fill="#6b7280">Compact · direct</text>
  </g>

  <!-- ══════════════════════════════════════════════════
       CARD 2b — Class-based / niConfigOptions (yoke)
       x=465, y=278, w=240, h=184
  ══════════════════════════════════════════════════ -->
  <g transform="translate(465,278)">
    <rect width="240" height="184" rx="14" fill="white" stroke="#C4D9F7" stroke-width="1.5"/>
    <!-- icon bg -->
    <rect width="240" height="98" rx="14" fill="#DBEAFE"/>
    <rect y="86" width="240" height="12" fill="#DBEAFE"/>
    <!-- yoke icon: two D-shaped handles meeting at (120,12) top and (120,55) base -->
    <!-- left arc -->
    <path d="M 120,12 Q 60,12 60,33 Q 60,55 120,55"
          fill="none" stroke="#3B82F6" stroke-width="4.5" stroke-linecap="round"/>
    <!-- right arc (mirror) -->
    <path d="M 120,12 Q 180,12 180,33 Q 180,55 120,55"
          fill="none" stroke="#3B82F6" stroke-width="4.5" stroke-linecap="round"/>
    <!-- center shaft -->
    <line x1="120" y1="55" x2="120" y2="90" stroke="#3B82F6" stroke-width="5" stroke-linecap="round"/>
    <!-- junction caps -->
    <circle cx="120" cy="12" r="6" fill="#3B82F6"/>
    <circle cx="120" cy="55" r="6" fill="#3B82F6"/>
    <!-- card labels -->
    <text x="120" y="116" text-anchor="middle" font-size="13" font-weight="700" fill="#3B82F6">Class-based</text>
    <text x="120" y="134" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600" fill="#3B82F6">niConfigOptions</text>
    <text x="120" y="155" text-anchor="middle" font-size="11" fill="#6b7280">2 calls per C function</text>
    <text x="120" y="171" text-anchor="middle" font-size="11" fill="#6b7280">Structured · verbose</text>
  </g>

  <!-- ══════════════════════════════════════════════════
       CARD 3 — MATLAB User (the driver)
       x=895, y=145, w=210, h=230
  ══════════════════════════════════════════════════ -->
  <g transform="translate(895,145)">
    <rect width="210" height="230" rx="14" fill="white" stroke="#C4D9F7" stroke-width="1.5"/>
    <!-- icon bg -->
    <rect width="210" height="118" rx="14" fill="#DBEAFE"/>
    <rect y="106" width="210" height="12" fill="#DBEAFE"/>
    <!-- laptop: screen housing -->
    <rect x="35" y="12" width="140" height="88" rx="6" fill="#1D4ED8"/>
    <!-- screen glass -->
    <rect x="41" y="17" width="128" height="78" rx="4" fill="#EFF6FF"/>
    <!-- code lines on screen -->
    <rect x="52" y="28" width="75" height="7" rx="2" fill="#1D4ED8" opacity="0.85"/>
    <rect x="52" y="42" width="58" height="7" rx="2" fill="#1D4ED8" opacity="0.65"/>
    <rect x="52" y="56" width="85" height="7" rx="2" fill="#1D4ED8" opacity="0.85"/>
    <rect x="52" y="70" width="42" height="7" rx="2" fill="#1D4ED8" opacity="0.45"/>
    <!-- screen-to-base hinge -->
    <rect x="35" y="100" width="140" height="4" rx="0" fill="#1D4ED8" opacity="0.3"/>
    <!-- laptop base -->
    <rect x="23" y="100" width="164" height="16" rx="5" fill="#1D4ED8"/>
    <!-- card labels -->
    <text x="105" y="140" text-anchor="middle" font-size="14" font-weight="700" fill="#1D4ED8">MATLAB</text>
    <text x="105" y="160" text-anchor="middle" font-size="14" font-weight="700" fill="#1D4ED8">Engineer</text>
    <text x="105" y="182" text-anchor="middle" font-size="12" fill="#6b7280">Same task, different</text>
    <text x="105" y="200" text-anchor="middle" font-size="12" fill="#6b7280">experience with each</text>
    <text x="105" y="218" text-anchor="middle" font-size="12" fill="#6b7280">wrapper API</text>
  </g>

  <!-- ══════════════════════════════════════════════════
       ARROWS
       Left card right edge: (260, 260)
       Fork x: 355
       Mid card left edge: 465 / right edge: 705
       Merge x: 800
       Right card left edge: 895
  ══════════════════════════════════════════════════ -->

  <!-- stem: left card → fork junction -->
  <line x1="260" y1="260" x2="348" y2="260" stroke="#1D4ED8" stroke-width="2" stroke-dasharray="7 5"/>
  <!-- fork vertical bar -->
  <line x1="355" y1="150" x2="355" y2="370" stroke="#1D4ED8" stroke-width="2" stroke-dasharray="7 5"/>
  <!-- fork → top card -->
  <line x1="355" y1="150" x2="451" y2="150" stroke="#1D4ED8" stroke-width="2" stroke-dasharray="7 5"/>
  <polygon points="451,144 465,150 451,156" fill="#1D4ED8"/>
  <!-- fork → bottom card -->
  <line x1="355" y1="370" x2="451" y2="370" stroke="#1D4ED8" stroke-width="2" stroke-dasharray="7 5"/>
  <polygon points="451,364 465,370 451,376" fill="#1D4ED8"/>
  <!-- junction dot at fork -->
  <circle cx="355" cy="260" r="5" fill="#1D4ED8"/>

  <!-- top card right → merge -->
  <path d="M 705,150 H 800 V 262" stroke="#1D4ED8" stroke-width="2" stroke-dasharray="7 5" fill="none"/>
  <!-- bottom card right → merge -->
  <path d="M 705,370 H 800 V 258" stroke="#1D4ED8" stroke-width="2" stroke-dasharray="7 5" fill="none"/>
  <!-- merge → right card -->
  <line x1="800" y1="260" x2="881" y2="260" stroke="#1D4ED8" stroke-width="2" stroke-dasharray="7 5"/>
  <polygon points="881,254 895,260 881,266" fill="#1D4ED8"/>
  <!-- junction dot at merge -->
  <circle cx="800" cy="260" r="5" fill="#1D4ED8"/>

  <!-- ── Arrow labels ── -->
  <!-- stem label -->
  <text x="308" y="251" text-anchor="middle" font-size="11" fill="#9ca3af" letter-spacing="0.03em">wraps C library</text>
  <!-- fork labels -->
  <text x="408" y="140" text-anchor="middle" font-size="11" fill="#9ca3af">1 MATLAB call</text>
  <text x="408" y="392" text-anchor="middle" font-size="11" fill="#9ca3af">2 MATLAB calls</text>
  <!-- merge label -->
  <text x="847" y="251" text-anchor="middle" font-size="11" fill="#9ca3af">writes code</text>

  <!-- ── vs. badge between the two middle cards ── -->
  <rect x="548" y="248" width="44" height="26" rx="13" fill="white" stroke="#C4D9F7" stroke-width="1.5"/>
  <text x="570" y="266" text-anchor="middle" font-size="12" font-weight="700" fill="#6b7280">vs.</text>

  <!-- ══════════════════════════════════════════════════
       CAPTION
  ══════════════════════════════════════════════════ -->
  <text x="600" y="484" text-anchor="middle" font-size="14" font-weight="500" fill="#374151">
    Same engine (NI-DAQmx C library), two steering wheels — which wrapper works better for the driver?
  </text>
  <text x="600" y="508" text-anchor="middle" font-size="12" fill="#9ca3af">
    Artifact #2 · Steering-wheel analogy · NI-DAQmx API Design
  </text>

</svg>
